<svg width="600" height="90" viewBox="0 0 600 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobileGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e2761" />
      <stop offset="50%" stop-color="#5a4dbf" />
      <stop offset="100%" stop-color="#9b8ce8" />
    </linearGradient>

    <filter id="mobileGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .mobile-text {
        font-family: 'Trebuchet MS', Verdana, Arial, sans-serif;
        font-weight: 800;
        font-size: 32px;
      }
      @keyframes ringPulse {
        0%   { r: 6;  opacity: 0.9; }
        100% { r: 30; opacity: 0; }
      }
      .ping-ring {
        animation-name: ringPulse;
        animation-timing-function: ease-out;
        animation-iteration-count: infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes dotBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .home-dot {
        animation: dotBounce 1.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes barGrow {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1); }
      }
      .signal-bar {
        animation-name: barGrow;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        transform-box: fill-box;
        transform-origin: bottom;
      }
    </style>
  </defs>

  <!-- phone icon with notification ping -->
  <g transform="translate(34, 18)">
    <rect x="0" y="0" width="30" height="54" rx="7" fill="none" stroke="url(#mobileGradient)" stroke-width="3" />
    <circle class="home-dot" cx="15" cy="46" r="2.6" fill="url(#mobileGradient)" />
    <circle class="ping-ring" cx="26" cy="8" r="6" fill="none" stroke="#9b8ce8" stroke-width="2" style="animation-duration:1.8s; animation-delay:0s;" />
    <circle class="ping-ring" cx="26" cy="8" r="6" fill="none" stroke="#9b8ce8" stroke-width="2" style="animation-duration:1.8s; animation-delay:0.6s;" />
    <circle cx="26" cy="8" r="4" fill="url(#mobileGradient)" />
  </g>

  <!-- main heading text -->
  <text x="320" y="50" text-anchor="middle" class="mobile-text" fill="url(#mobileGradient)" filter="url(#mobileGlow)">
    Mobile Team
  </text>

  <!-- animated signal bars -->
  <g transform="translate(540, 30)">
    <rect class="signal-bar" x="0"  y="22" width="6" height="12" rx="1.5" fill="#9b8ce8" style="animation-duration:1.1s; animation-delay:0s;" />
    <rect class="signal-bar" x="10" y="14" width="6" height="20" rx="1.5" fill="#5a4dbf" style="animation-duration:1.1s; animation-delay:0.2s;" />
    <rect class="signal-bar" x="20" y="6"  width="6" height="28" rx="1.5" fill="#2e2761" style="animation-duration:1.1s; animation-delay:0.4s;" />
  </g>
</svg>
