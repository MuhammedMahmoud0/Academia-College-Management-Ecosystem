<svg width="600" height="90" viewBox="0 0 600 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e2761">
        <animate attributeName="stop-color"
          values="#2e2761;#5a4dbf;#9b8ce8;#c4bdf0;#2e2761"
          dur="3.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#5a4dbf">
        <animate attributeName="stop-color"
          values="#5a4dbf;#9b8ce8;#c4bdf0;#2e2761;#5a4dbf"
          dur="3.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#9b8ce8">
        <animate attributeName="stop-color"
          values="#9b8ce8;#c4bdf0;#2e2761;#5a4dbf;#9b8ce8"
          dur="3.5s" repeatCount="indefinite" />
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-0.3 0; 0.3 0; -0.3 0" dur="3.2s" repeatCount="indefinite" />
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .holo-text {
        font-family: 'Trebuchet MS', Verdana, Arial, sans-serif;
        font-weight: 800;
        font-size: 34px;
      }
      @keyframes floatSwatch {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-9px); }
        100% { transform: translateY(0px); }
      }
      .swatch {
        animation-name: floatSwatch;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes drawLine {
        0%   { stroke-dashoffset: 240; }
        60%  { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      .underline {
        stroke-dasharray: 240;
        animation: drawLine 2.8s ease-in-out infinite;
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0.4); }
        50% { opacity: 1; transform: scale(1); }
      }
      .spark {
        animation-name: sparkle;
        animation-iteration-count: infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
    </style>
  </defs>

  <!-- floating color swatches -->
  <circle class="swatch" cx="35" cy="30" r="5" fill="#9b8ce8" opacity="0.9" style="animation-duration:2.4s;" />
  <rect class="swatch" x="555" y="22" width="9" height="9" rx="2" fill="#5a4dbf" opacity="0.9" style="animation-duration:2.9s; animation-delay:0.3s;" />
  <polygon class="swatch" points="50,68 56,78 44,78" fill="#c4bdf0" opacity="0.9" style="animation-duration:2.1s; animation-delay:0.6s;" />
  <circle class="swatch" cx="565" cy="65" r="4.5" fill="#3d3380" opacity="0.9" style="animation-duration:2.6s; animation-delay:0.2s;" />

  <!-- sparkles -->
  <g class="spark" style="animation-duration:1.6s; animation-delay:0.2s;" fill="#ece9fb">
    <path d="M120,18 l2,6 l6,2 l-6,2 l-2,6 l-2,-6 l-6,-2 l6,-2 z" />
  </g>
  <g class="spark" style="animation-duration:1.9s; animation-delay:0.9s;" fill="#ece9fb">
    <path d="M480,70 l1.6,5 l5,1.6 l-5,1.6 l-1.6,5 l-1.6,-5 l-5,-1.6 l5,-1.6 z" />
  </g>

  <!-- glow backdrop pass -->
  <text x="300" y="50" text-anchor="middle" class="holo-text" fill="url(#holoGradient)" filter="url(#softGlow)" opacity="0.5">
    Frontend Team
  </text>

  <!-- crisp main text -->
  <text x="300" y="50" text-anchor="middle" class="holo-text" fill="url(#holoGradient)">
    Frontend Team
  </text>

  <!-- animated brush underline -->
  <path class="underline" d="M90,68 C180,80 420,80 510,68" fill="none" stroke="url(#holoGradient)" stroke-width="4" stroke-linecap="round" />
</svg>
